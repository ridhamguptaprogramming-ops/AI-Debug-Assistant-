<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Debug Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🚀 AI Debug Assistant</h1>
        
        <div class="input-section">
            <div class="form-group">
                <label for="lang">Language:</label>
                <select id="lang">
                    <option value="Python">Python</option>
                    <option value="JavaScript">JavaScript</option>
                    <option value="Java">Java</option>
                    <option value="C">C</option>
                    <option value="C++">C++</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="code">Your Code:</label>
                <textarea id="code" placeholder="Paste your code here..."></textarea>
            </div>
            
            <button onclick="analyzeCode()">🔍 Analyze & Fix</button>
            <button onclick="getHistory()">📚 View History</button>
        </div>
        
        <div class="output-section">
            <div id="output"></div>
            <div id="history"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
